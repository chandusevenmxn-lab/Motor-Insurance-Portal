# Local development: use in-memory H2 database to avoid requiring Postgres
spring.datasource.url=jdbc:h2:mem:motor_portal_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# If you need Postgres in other environments, uncomment and configure below
# spring.datasource.url=jdbc:postgresql://localhost:5432/motor_portal_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security / JWT (Okta/OAuth2 configuration placeholder)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://okta.zurich.com/oauth2/default

# Local development credentials (stable, override the generated password)
spring.security.user.name=dev
spring.security.user.password=devpass
