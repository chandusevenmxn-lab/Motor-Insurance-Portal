name: CI/CD - Backend Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Build backend jar
        run: ./gradlew :backend:experience-api:bootJar -x test --no-daemon

      - name: Build Docker image
        run: |
          IMAGE=${{ github.repository }}:experience-api-${{ github.sha }}
          docker build -f backend/experience-api/Dockerfile -t $IMAGE .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Login to DockerHub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to DockerHub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag $IMAGE ${{ secrets.DOCKERHUB_USERNAME }}/experience-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/experience-api:latest

      - name: Deploy via SSH (optional)
        if: ${{ secrets.SSH_HOST != '' }}
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/experience-api:latest || true
            docker stop experience-api || true
            docker rm experience-api || true
            docker run -d --name experience-api -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/experience-api:latest
